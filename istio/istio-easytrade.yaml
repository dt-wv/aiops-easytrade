apiVersion: networking.istio.io/v1alpha3
kind: Gateway
metadata:
  name: easytrade-gateway
  namespace: easytrade
spec:
  selector:
    istio: ingressgateway
  servers:
    - port:
        number: 80
        name: http
        protocol: HTTP
      hosts:
        - "*"
    - port:
        number: 8080
        name: http2
        protocol: HTTP
      hosts:
        - "*"
---
apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: easytrade-httproute
  namespace: easytrade
spec:
  hosts:
    - "*"
  gateways:
    - easytrade-gateway
  http:
    - match:
        - port: 30110
      route:
        - destination:
            port:
              number: 80
            host: frontendreverseproxy-easytrade.easytrade.svc.cluster.local
    - match:
        - port: 30111
      route:
        - destination:
            port:
              number: 8080
            host: feature-flag-service.easytrade.svc.cluster.local